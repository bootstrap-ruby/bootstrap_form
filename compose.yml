# Set up the Selenium container based on the Selenium official:
# https://github.com/SeleniumHQ/docker-selenium/blob/trunk/docker-compose-v3.yml
# And:
# https://medium.com/@retrorubies/chrome-as-a-service-for-rails-testing-b1a45e70fec1
services:
  web:
    image: lenchoreyes/jade:rails-app-${RUBY_VERSION:-4.0}-sqlite-trixie
    stdin_open: true
    tty: true
    user: "dev:dev"
    volumes:
      - .:/home/dev/app
      - dev_home:/home/dev
    environment:
      - SELENIUM_HOST=selenium
      - SELENIUM_PORT=4444
      - TEST_APP_HOST=web
      - TEST_APP_PORT=3001
    ports:
      - "3000"
      - "3001"
      - "5990"
    command: /bin/bash

  selenium:
    image: selenium/standalone-chrome:133.0
    shm_size: 2gb
    logging:
      driver: none
    stdin_open: true
    tty: true
    environment:
      - LANG=en_CA.UTF-8
      - LANGUAGE=en_CA.UTF-8
      - LANG_WHERE=CA
      - LANG_WHICH=en
    ports:
      - "7900"

volumes:
  dev_home:
